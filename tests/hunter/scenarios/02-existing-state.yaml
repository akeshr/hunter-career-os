id: 02-existing-state
title: Rename one profile in an existing workspace
workflow: profiles-and-state
capability_profile: full
capabilities:
  available:
    - files.read
    - state.read
    - state.write
  unavailable: []
  failures: []
fixtures:
  - ../fixtures/state/valid/two-profiles.yaml
capability_bindings:
  state.read:
    - ../fixtures/state/valid/two-profiles.yaml
prompt: |
  In the supplied Hunter state, rename profile-alpha to "Primary Profile" and save the change.
expected:
  must:
    - Validate the existing state and continue without rerunning onboarding.
    - Change only profile-alpha's display name and increment its record_revision exactly once.
    - Increment the root revision exactly once, preserve stable IDs, and preserve all unknown fields including extensions.future_flag.
    - Report a state.write result backed by the actual saved transition.
  must_not:
    - Modify profile-beta, its record revision, its name, or its data.
    - Ask the user to onboard the already valid workspace again.
  state:
    - Root revision changes from 1 to 2 and profile-alpha record_revision changes from 1 to 2.
    - profile-beta is byte-equivalent by value, extensions.future_flag remains true, and the resulting state validates.
