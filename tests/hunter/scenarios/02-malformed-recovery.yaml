id: 02-malformed-recovery
title: Repair malformed state without overwriting the original
workflow: profiles-and-state
capability_profile: full
capabilities:
  available:
    - files.read
    - state.read
    - state.write
  unavailable: []
  failures: []
fixtures:
  - ../fixtures/state/repair/missing-collections.yaml
capability_bindings:
  state.read:
    - ../fixtures/state/repair/missing-collections.yaml
prompt: |
  The supplied Hunter state will not load. Diagnose the exact problem, recover everything that can be recovered, and save a repaired copy without changing the original.
expected:
  must:
    - Identify that profiles, opportunities, pursuits, relationships, activities, and tasks are the missing required root collections.
    - Preserve every recoverable and unknown field, including extensions.future_flag.
    - Create a separate repaired copy, validate it, and report the actual state.write result when repair is possible.
  must_not:
    - Overwrite or modify the malformed original.
    - Guess a migration or silently downgrade when a newer unsupported schema is encountered.
    - Claim that repair or validation succeeded without the corresponding result.
  state:
    - The repaired copy restores empty objects for map collections and empty arrays for activities and tasks while preserving schema_version, revision, workspace, and extensions.
    - The repaired copy validates against schema version 0.1 and the original remains unchanged.
