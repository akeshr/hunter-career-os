id: 02-document-onboarding
title: Build a first workspace from supplied career material
workflow: onboarding
capability_profile: full
capabilities:
  available:
    - files.read
    - state.read
    - state.write
  unavailable: []
  failures: []
fixtures:
  - ../fixtures/career/profile-source.md
capability_bindings:
  files.read:
    - ../fixtures/career/profile-source.md
prompt: |
  Set me up from the supplied generic career material. Build my first workspace, save it so I can continue later, and tell me what I should do next.
expected:
  must:
    - Ask no more than three blocking questions before returning the first useful result.
    - Create a stable profile ID and make it the workspace default profile.
    - Create schema 0.1 state at root revision 1 with the profile at record revision 1 and every required root collection.
    - Return the initial profile, working targets or preferences, material gaps, and exactly three next actions.
    - Validate the state and provide an actual state.write result or a complete replacement YAML file.
  must_not:
    - Require external proof before using the supplied material as working data.
    - Claim that state was saved without a corresponding state.write result.
    - Overwrite the supplied career material.
  state:
    - The new state has schema_version "0.1", root revision 1, and profile record_revision 1.
    - workspace.default_profile_id equals the new stable profile ID and all required root collections exist.
