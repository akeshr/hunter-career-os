id: 03-duplicate-lead
title: Deduplicate a listing without converting a lead into a job
workflow: opportunities
capability_profile: reduced
capabilities:
  available:
    - files.read
    - state.read
    - state.write
  unavailable:
    - browser.search
    - browser.navigate
    - connected.sources.read
  failures: []
fixtures:
  - ../fixtures/workflows/opportunities/state-before.yaml
  - ../fixtures/workflows/opportunities/listing-primary.md
  - ../fixtures/workflows/opportunities/listing-duplicate.md
  - ../fixtures/workflows/opportunities/recruiter-lead.md
capability_bindings:
  files.read:
    - ../fixtures/workflows/opportunities/state-before.yaml
    - ../fixtures/workflows/opportunities/listing-primary.md
    - ../fixtures/workflows/opportunities/listing-duplicate.md
    - ../fixtures/workflows/opportunities/recruiter-lead.md
  state.read:
    - ../fixtures/workflows/opportunities/state-before.yaml
prompt: |
  Normalize the supplied opportunity material for profile-alpha. Identify duplicates and leads, preserve useful sources, and show the result without saving it.
expected:
  must:
    - Produce one canonical Example Systems Operations Lead opportunity with both distinct source URLs preserved.
    - Keep the Example Talent message as a separate lead because it has no confirmed client, title, location, engagement, or requisition.
    - Return receipts for all three supplied source files.
  must_not:
    - Produce two canonical records for the same Example Systems role.
    - Force the recruiter message into a confirmed listing or invent any missing lead detail.
    - Save or mutate state when the prompt requests a preview only.
  state:
    - Any staged record uses valid stable IDs and references that resolve to profile-alpha.
    - profile-alpha and profile-beta remain unchanged by value, including their record revisions and isolated profile data.
    - No candidate state is written; root revision remains 1 and every downstream collection remains empty.
