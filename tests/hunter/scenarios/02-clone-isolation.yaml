id: 02-clone-isolation
title: Clone a profile without future coupling
workflow: profiles-and-state
capability_profile: full
capabilities:
  available:
    - files.read
    - state.read
    - state.write
  unavailable: []
  failures: []
fixtures:
  - ../fixtures/state/valid/two-profiles.yaml
capability_bindings:
  state.read:
    - ../fixtures/state/valid/two-profiles.yaml
prompt: |
  Clone profile-alpha in the supplied Hunter state as "Alpha Consulting". Change only the clone's custom_note to "Clone-only consulting note", save it, and leave every existing profile unchanged.
expected:
  must:
    - Give the clone a new stable profile ID, record_revision 1, the requested name, and an independent copy of the source profile data.
    - Apply the custom_note change only to the clone and produce a valid transition with one root revision increment.
    - Treat the clone as independent so later edits never inherit or synchronize automatically in either direction.
  must_not:
    - Mutate profile-alpha or profile-beta, including their names, data, stable IDs, and record revisions.
    - Create future inheritance, synchronization, or a shared factual core between the source and clone.
  state:
    - Root revision changes from 1 to 2; the new clone starts at record_revision 1; existing record revisions stay unchanged.
    - profile-alpha retains custom_note "Alpha-specific note", the clone has custom_note "Clone-only consulting note", and the resulting state validates.
